# Release workflow: build and publish to PyPI when a version tag is pushed.
#
# Trigger: pushing a tag that looks like a version, e.g. `v0.1.1`.
#   git tag -a v0.1.1 -m "0.1.1" && git push origin v0.1.1
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token is stored in
# the repo. ONE-TIME SETUP on PyPI before the first tagged release:
#   1. https://pypi.org/manage/project/mcp-strike/settings/publishing/
#   2. Add a GitHub trusted publisher:
#        Owner:           LeoMartinezTAMUK
#        Repository:      mcp-strike
#        Workflow name:   release.yml
#        Environment:     (leave blank — this workflow sets none)
# After that, every `v*` tag push builds and publishes automatically.

name: release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for Trusted Publishing: lets the job mint a short-lived
      # OIDC token PyPI verifies. No long-lived secrets involved.
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
